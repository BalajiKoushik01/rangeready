<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RangeReady Loading</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .logo-container {
            position: relative;
            margin-bottom: 2rem;
            animation: pulse 2s infinite ease-in-out;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #94a3b8;
            margin-top: -0.5rem;
            opacity: 0.8;
        }

        .loader-track {
            width: 240px;
            height: 4px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 4px;
            margin-top: 2rem;
            position: relative;
            overflow: hidden;
        }

        .loader-bar {
            position: absolute;
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            border-radius: 4px;
            animation: move-loader 1.5s infinite ease-in-out;
        }

        .status-text {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 1rem;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
        }

        @keyframes move-loader {
            0% { left: -40%; }
            50% { left: 100%; }
            100% { left: -40%; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo">RangeReady</div>
        <div class="subtitle">Industrial RF Engine</div>
    </div>
    <div class="loader-track">
        <div class="loader-bar"></div>
    </div>
    <div class="status-text">Synchronizing Instrumentation Bus...</div>
</body>
</html>
